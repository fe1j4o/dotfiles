# ── Global ───────────────────────────────────────────────────────────────────
"$schema" = 'https://starship.rs/config-schema.json'
add_newline = true
scan_timeout = 30
command_timeout = 500

format = """
$os$username$hostname$directory$git_branch$git_status$git_state$git_metrics\
$python$nodejs$java$rust$lua$kotlin$c$cpp$golang$php$ruby$swift$zig\
$cmd_duration
$character"""

# ── OS — always visible Arch icon ─────────────────────────────────────────────
[os]
disabled = false
style = "bold blue"
format = "[$symbol]($style) "

[os.symbols]
Arch = "󰣇 "
Linux = "󰌽 "

# ── Username ──────────────────────────────────────────────────────────────────
[username]
show_always = true
style_user = "bold cyan"
style_root = "bold red"
format = "[$user]($style)"

# ── Hostname (only on SSH) ────────────────────────────────────────────────────
[hostname]
ssh_only = true
style = "bold green"
format = "@[$hostname]($style) "

# ── Directory with folder icons ───────────────────────────────────────────────
[directory]
style = "bold blue"
truncation_length = 3
truncate_to_repo = true
read_only = " 󰌾"
format = " [$path]($style)[$read_only]($read_only_style) "

[directory.substitutions]
"Documents"  = "󰈙 Documents"
"Downloads"  = "󰇚 Downloads"
"Pictures"   = "󰋩 Pictures"
"Music"      = "󰝚 Music"
"Videos"     = "󰕧 Videos"
"Desktop"    = "󰍹 Desktop"
"Projects"   = "󰲋 Projects"
"dev"        = "{} dev"
"~"          = "~"

# ── Git ───────────────────────────────────────────────────────────────────────
[git_branch]
symbol = "󰊢 "
style = "bold purple"
format = "[$symbol$branch]($style) "
truncation_length = 20

[git_status]
style = "bold red"
format = '([$all_status$ahead_behind]($style) )'
conflicted = "⚡"
ahead = "󰁝 ${count}"
behind = "󰁛 ${count}"
diverged = "󰁝󰁛 ${ahead_count}⇣${behind_count}"
untracked = "󰎀 ${count}"
stashed = "󰏗 "
modified = "󰏫 ${count}"
staged = "󰐙 ${count}"
renamed = "󰑕 ${count}"
deleted = "󰩺 ${count}"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "bold yellow"
rebase = "REBASING"
merge = "MERGING"
revert = "REVERTING"
cherry_pick = "🍒 PICKING"
bisect = "BISECTING"
am = "AM"
am_or_rebase = "AM/REBASE"

[git_metrics]
added_style = "bold green"
deleted_style = "bold red"
format = '[+$added]($added_style)/[-$deleted]($deleted_style) '
disabled = false

[git_commit]
commit_hash_length = 7
tag_symbol = " 󰓼 "
style = "bold green"

# ── Languages ─────────────────────────────────────────────────────────────────
[python]
symbol = "󰌠 "
style = "bold yellow"
format = "[$symbol$version]($style) "
detect_files = ["*.py", "requirements.txt", "pyproject.toml"]

[nodejs]
symbol = "󰎙 "
style = "bold green"
format = "[$symbol$version]($style) "

[java]
symbol = "󰬷 "
style = "bold red"
format = "[$symbol$version]($style) "

[rust]
symbol = "󱘗 "
style = "bold orange"
format = "[$symbol$version]($style) "

[lua]
symbol = "󰢱 "
style = "bold blue"
format = "[$symbol$version]($style) "

[kotlin]
symbol = "󱈙 "
style = "bold purple"
format = "[$symbol$version]($style) "

[c]
symbol = "󰙱 "
style = "bold cyan"
format = "[$symbol$version]($style) "

[cpp]
symbol = "󰙲 "
style = "bold cyan"
format = "[$symbol$version]($style) "

[golang]
symbol = "󰟓 "
style = "bold cyan"
format = "[$symbol$version]($style) "

[php]
symbol = "󰌟 "
style = "bold purple"
format = "[$symbol$version]($style) "

[ruby]
symbol = "󰴭 "
style = "bold red"
format = "[$symbol$version]($style) "

[swift]
symbol = "󰛥 "
style = "bold orange"
format = "[$symbol$version]($style) "

[zig]
symbol = "󱐋 "
style = "bold yellow"
format = "[$symbol$version]($style) "

# ── Command duration ──────────────────────────────────────────────────────────
[cmd_duration]
min_time = 2000
format = "[󱦟 took $duration](bold yellow) "

# ── Prompt character ──────────────────────────────────────────────────────────
# OPTIONS - pick one and delete the others:
#
# Arrows:
#   ❯   (default starship)
#   →   (simple right arrow)
#   ➜   (bold arrow)
#   ➤   (solid arrow)
#   ▶   (triangle)
#   󰁔   (nerd font arrow)
#
# Symbols:
#   λ   (lambda - popular in functional programming)
#   ϟ   (lightning bolt)
#   $   (classic shell)
#   #   (root style)
#   ✦   (star)
#   ◆   (diamond)

[character]
success_symbol = "[▶](bold green)"
error_symbol = "[▶](bold red)"
vimcmd_symbol = "[❮](bold yellow)"

# ── Battery ───────────────────────────────────────────────────────────────────
[battery]
full_symbol = "󰁹 "
charging_symbol = "󰂄 "
discharging_symbol = "󰁺 "
format = "[$symbol$percentage]($style) "

[[battery.display]]
threshold = 30
style = "bold red"

[[battery.display]]
threshold = 60
style = "bold yellow"

# ── Time ──────────────────────────────────────────────────────────────────────
[time]
disabled = true   # set to false to show clock in prompt
format = "[󰥔 $time]($style) "
time_format = "%H:%M"
style = "bold dimmed white"
